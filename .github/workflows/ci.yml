name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  # ---------------------------------------------------------------------------
  # Rust — format, lint, test
  # ---------------------------------------------------------------------------
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all

  # ---------------------------------------------------------------------------
  # Go — vet and lint
  # ---------------------------------------------------------------------------
  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: services/api/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/api

  # ---------------------------------------------------------------------------
  # TypeScript — type check
  # ---------------------------------------------------------------------------
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Rust integration tests — real Postgres + Redis
  # Runs integration tests that are silently skipped when TEST_DATABASE_URL
  # and TEST_REDIS_URL are absent. Scoped to push/PR against main and dev.
  # ---------------------------------------------------------------------------
  rust-integration:
    name: Rust integration tests
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') ||
      github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'dev')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: trident
          POSTGRES_DB: trident_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Apply database schema
        env:
          PGPASSWORD: trident
        run: |
          psql -h localhost -U postgres -d trident_test \
            -f database/schema.sql

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:trident@localhost:5432/trident_test
          TEST_REDIS_URL: redis://localhost:6379
          CI: "true"
        run: cargo test --all -- --include-ignored

  # ---------------------------------------------------------------------------
  # Docker — build images (no push)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Go API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api/Dockerfile
          push: false
          tags: trident-go-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
